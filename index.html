<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remnant Interactive Poster</title>

    <!--This is connecting my css to the html-->
    <link rel="stylesheet" href="style.css">
  
</head>

<body>


    <!--This is the webcam, it is not something that is seen but used, the feed is seen-->
    <video id="video" autoplay playsinline style="display: none;"></video>

    <!--This is the canvas output-->
    <canvas id="canvas"></canvas>

    <!--This is where the logo, qr and text is placed to sit ontop of the selfie segmentation-->
    <div class="overlay">
        <img src="assets/Colour_Primary.png" class="logo">
        <img src="assets/remnant-qr-code.png" class="qr">
        <h1 class="title" >WHEN YOU LEAVE, I REMAIN</h1>
    </div>

    <!--The shapes / background for the selfie segmentation-->
    <img id="texture" src="assets/Remnant-interactive-poster-texture-full.png" style="display: none;"/>

    <!--This is the software from Mediapipe that allows for the selfie segmentation through the webcam-->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>

    <!--This is my js file, this is connecting the html to the js-->
    <script src="script.js"></script>

   
    
</body>
</html>
